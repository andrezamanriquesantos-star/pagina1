<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordem Paranormal - Painel do Investigador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ORDEM PARANORMAL</h1>
        <p>O Medo é a Chave.</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Rolagem de Dados</h2>
            <div class="botoes-dados">
                <button onclick="rolarDado('1d4')">Rolar 1d4</button>
                <button onclick="rolarDado('1d6')">Rolar 1d6</button>
                <button onclick="rolarDado('1d12')">Rolar 1d12</button>
                <button onclick="rolarDado('1d20')">Rolar 1d20</button>
            </div>
            <div class="input-personalizado">
                <input type="text" id="dadoCustom" placeholder="Ex: 3d6, 2d20">
                <button onclick="rolarDado(document.getElementById('dadoCustom').value)">Rolar</button>
            </div>
            <div id="resultadoDado" class="resultado"></div>
        </section>

        <section class="card">
            <h2>Temporadas & Spin-offs</h2>
            <button onclick="carregarTemporadas()" class="btn-carregar">Carregar Linha do Tempo</button>
            <div id="listaTemporadas" class="lista-temporadas">
                </div>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:8080/api";

        async function rolarDado(dado) {
            if(!dado) return;
            try {
                const response = await fetch(`${API_URL}/rolar?dado=${dado}`);
                const data = await response.json();
                const divResultado = document.getElementById('resultadoDado');
                
                if(data.sucesso) {
                    divResultado.innerHTML = `<strong>Resultado para ${dado}:</strong> ${data.total} <br> <span class="detalhe">Dados: [${data.rolagens.join(', ')}]</span>`;
                } else {
                    divResultado.innerHTML = `<span class="erro">${data.erro}</span>`;
                }
            } catch (err) {
                divResultado.innerHTML = `<span class="erro">Erro ao conectar com o servidor Java.</span>`;
            }
        }

        async function carregarTemporadas() {
            try {
                const response = await fetch(`${API_URL}/temporadas`);
                const data = await response.json();
                const lista = document.getElementById('listaTemporadas');
                lista.innerHTML = "";

                data.forEach(temp => {
                    const item = document.createElement('div');
                    item.className = 'item-temporada';
                    item.innerHTML = `<h3>${temp.titulo}</h3><p>${temp.descricao}</p>`;
                    lista.appendChild(item);
                });
            } catch (err) {
                alert("Erro ao carregar as temporadas do servidor.");
            }
        }
    </script>
</body>
</html>
